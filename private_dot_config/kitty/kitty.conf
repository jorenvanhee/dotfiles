font_family Maple Mono NF
font_size 14
modify_font cell_height +11px
modify_font cell_width 95%

hide_window_decorations titlebar-only
window_padding_width 10
resize_in_steps yes

# Let Option act as Alt instead of inserting special characters,
# so terminal apps can use Alt mappings (e.g. <A-j> in neovim)
macos_option_as_alt yes

# Enable remote control for kitty @ commands (used by our kitty-sessionizer).
allow_remote_control yes

# First layout is the default; order determines cycling sequence.
enabled_layouts tall,horizontal,fat,vertical,grid,splits,stack

# Tab title: [session]  index[:layout] process
#   "1 nvim"             — single window, running nvim
#   "2:T zsh"            — two windows in tall layout
#   "3:Z nvim"           — zoomed (stack layout)
#   "myproject  1 nvim"  — first tab shows the session name
tab_title_template "{('' + session_name + '  ') if session_name and index == 1 else ''}{index}{(':' + ('Z' if layout_name == 'stack' else layout_name[0].upper())) if num_windows > 1 else ''} {title.rsplit(' ', 1)[-1]}"

# Show tabs from the current/last-active session (session:~)
# and tabs not created in any session (session:^$)
tab_bar_filter session:~ or session:^$
tab_bar_min_tabs 1
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round

# vim-kitty-navigator (https://github.com/knubie/vim-kitty-navigator)
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l

# vim-kitty-navigator: listen for control messages
listen_on unix:/tmp/mykitty

# Remap Cmd+S/E/C to F1/F2/F3 for use in neovim.
# Cmd+C only remaps inside neovim so normal copy still works in kitty.
map super+s send_text all \x1bOP
map super+e send_text all \x1bOQ
map --when-focus-on var:IS_VIM=true super+c send_text all \x1bOR

# Launch via login shell so PATH includes user-installed tools (fzf, etc.)
map super+o launch --type=overlay zsh -il -c "~/.local/bin/kitty-sessionizer"
map super+g launch --type=overlay --cwd=current lazygit

# new_tab_with_cwd joins the active session (unlike new_tab).
map super+t new_tab_with_cwd
map super+w close_window

# Switch to the previously active session.
map super+l goto_session -1

map super+1 goto_tab 1
map super+2 goto_tab 2
map super+3 goto_tab 3
map super+4 goto_tab 4
map super+5 goto_tab 5
map super+6 goto_tab 6
map super+7 goto_tab 7
map super+8 goto_tab 8
map super+9 goto_tab 9

# Splits preserving current working directory
map super+shift+s launch --location=hsplit --cwd=current
map super+shift+v launch --location=vsplit --cwd=current
map super+enter new_window_with_cwd

# Disable default ctrl+shift+l; use super+shift+l instead.
map super+shift+l next_layout
map ctrl+shift+l no_op

# Toggle zoom (stack layout) on active window; press again to restore.
map super+z toggle_layout stack

# BEGIN_KITTY_THEME
# Gruvbox Light
include current-theme.conf
# END_KITTY_THEME
